<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script type="text/javascript" src="/_extensions/jquery-4.0.0.min.js"></script>
    <script type="text/javascript" src="/_extensions/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/_extensions/bootstrap.min.css">

    <script type="text/javascript" src="/_extensions/pizzip.min.js"></script>
    <script type="text/javascript" src="/_extensions/pizzip-utils.min.js"></script>
    <script type="text/javascript" src="/_extensions/docxtemplater.min.js"></script>
    <script type="text/javascript" src="/_extensions/FileSaver.min.js"></script>
    
    <script type="text/javascript" src="/_shared/sharedscript.js"></script>
    <link rel="stylesheet" href="/_shared/sharedstyle.css">

    <script type="text/javascript" src="script.js"></script>
    <link rel="stylesheet" href="style.css">

    <title>Project 1</title>
</head>
<body>
    <div id="return-div" class="return-div left">
        <button onclick="window.close()">[ RETURN ]</button>
    </div>

    <div class="center-parent">
        <p id="title" class="title center">Welcome</p><br>
        <p class="subtitle center">(made by dwn)</p><br>
        <p id="subtitle" class="subtitle center">(click the title to toggle the return button)</p>
    </div>

    <br><br>
    <div class="main-div">
        <span class="subtitle">this form will generate an ms word document using given inputs</span>
    </div>

    <form id="main-form" onkeydown="return event.key !== 'Enter';">
        <div class="center-parent">
            <div class="form-div center">
                <p>INPUT TEXT</p>

                <input type="text" id="subject" name="subject" placeholder="Subject* (eg. FIL, MATH)" autocomplete="off" required><br>
                <input type="text" id="quiznumber" name="quiznumber" placeholder="Quiz Number* (eg. 1-1, 3-2)" autocomplete="off" required><br><br>
                <input type="text" id="topic1" name="topic1" placeholder="Topic 1*" autocomplete="off" required><br>
                <input type="text" id="topic2" name="topic2" placeholder="Topic 2*" autocomplete="off" required><br>
                <input type="text" id="topic3" name="topic3" placeholder="Topic 3" autocomplete="off"><br>
                <input type="text" id="topic4" name="topic4" placeholder="Topic 4" autocomplete="off"><br>
                <input type="text" id="topic5" name="topic5" placeholder="Topic 5" autocomplete="off"><br>
                <input type="text" id="topic6" name="topic6" placeholder="Topic 6" autocomplete="off"><br>
                <input type="text" id="topic7" name="topic7" placeholder="Topic 7" autocomplete="off"><br>
                <input type="submit" id="submitBtn" name="submitBtn" value="Create">
            </div>
        </div>
    </form>
</body>
</html>
