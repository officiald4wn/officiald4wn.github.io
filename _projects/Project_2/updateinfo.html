<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/_extensions/jquery-4.0.0.min.js"></script>
    <script type="text/javascript" src="/_extensions/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/_extensions/bootstrap.min.css">

    <script type="text/javascript" src="/_shared/sharedscript.js"></script>
    <link rel="stylesheet" href="/_shared/sharedstyle.css">

    <script type="text/javascript" src="script.js"></script>
    <link rel="stylesheet" href="style.css">

    <title>Project 2 - Update Info</title>

    <script type="text/javascript">
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            alert("Access Denied. Please log in.");
            window.location.href = "login.html";
        }
    </script>   
</head>
<body>
    <div id="return-div" class="return-div left">
        <button onclick="window.close()">[ RETURN ]</button>
    </div>

    <div class="center-parent">
        <p id="title" class="title center">Update Info</p><br>
        <p class="subtitle2 center">(made by dwn)</p><br>
    </div>

    <div class="parent-div">

        <div class="form-div">
            <form id="uiform-quiz" onkeydown="return event.key !== 'Enter';">
                <p class="subtitle2">ADD QUIZ</p>
                <input id="Quizname" name="Quizname" placeholder="Quiz Name (eg. Math 1-1)" autocomplete="off" required><br>
                <input id="Quizdate" name="Quizdate" placeholder="Quiz Date (eg. 07/20/26)" autocomplete="off" required><br>
                <button type="submit">submit</button>
            </form>
            <button id="download-quiz" hidden>Download (<span id="count-quiz">0</span>)</button>
        </div>

        <div class="form-div">
            <form id="uiform-PA" onkeydown="return event.key !== 'Enter';">
                <p class="subtitle2">ADD PA</p>
                <input id="PAname" name="PAname" placeholder="PA Name (eg. Science 1-2)" autocomplete="off" required><br>
                <input id="PAdate" name="PAdate" placeholder="PA Date (eg. 04/20/27)" autocomplete="off" required><br>
                <button type="submit">submit</button>
            </form>
            <button id="download-PA" hidden>Download (<span id="count-PA">0</span>)</button>
        </div>

        <div class="form-div">
            <form id="uiform-event" onkeydown="return event.key !== 'Enter';">
                    <p class="subtitle2">ADD EVENT</p>
                    <input id="Eventname" name="Eventname" placeholder="Event Name (eg. AP Presentation Activity)" autocomplete="off" required><br>
                    <input id="Eventdate" name="Eventdate" placeholder="Event Date (eg. 07/25/26)" autocomplete="off" required><br>
                    <button type="submit">submit</button>
            </form>
            <button id="download-event" hidden>Download (<span id="count-event">0</span>)</button>
         </div>
    </div>
</body>
</html>
