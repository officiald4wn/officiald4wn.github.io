<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="script.js"></script>
    <link rel="stylesheet" href="SHARED.css"> 
    <link rel="stylesheet" href="style.css">

    <title>Homepage</title>
</head>
<body>

    <!--top part-->
    <div id="title-div" class="title-div">
        <p id="title" class="title">Welcome</p>

        <div class="break"></div>

        <p id="hint" class="subtitle">[click to proceed]</p>
        <p id="subtitle" class="subtitle" hidden>(made by dwn)</p>

        <div class="break"></div>

        <div id="play-pause" class="play-pause left" hidden>
            <img id="play" style="position: absolute;" src="assets/play.png" alt="Play" draggable="false" hidden>
            <img id="pause" src="assets/pause.png" alt="Pause" draggable="false">
        </div>
    </div>

    <!--grid part-->
    <div class="grid-div">
        <div id="about" class="grid-item header" hidden>About</div>
        <div id="contacts" class="grid-item contacts" hidden>Contacts</div>
        <div class="grid-item menu" hidden>Projects <br>[wip]</div>
        <div class="grid-item footer" hidden>something <br>[wip]</div>
    </div>
</body>
</html>
